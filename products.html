    // ===== State =====
    let currentLang = 'zh';
    let currentCategory = 'all';
    let searchQuery = '';

    // ===== Fuzzy Search =====
    function fuzzyMatch(text, query) {
      if (!text || !query) return !query;
      text = text.toLowerCase();
      query = query.toLowerCase();
      if (text.includes(query)) return true;
      // Word-by-word fuzzy: each query word must appear in text
      const words = query.split(/\s+/).filter(w => w.length > 0);
      if (words.length === 0) return true;
      return words.every(w => {
        if (w.length <= 2) return text.includes(w);
        // Check if any word in text starts with the query word
        const textWords = text.split(/\s+/);
        return textWords.some(tw => tw.startsWith(w) || tw.includes(w));
      });
    }

    // ===== Render =====
    function renderProducts() {
      const filtered = products.filter(p => {
        const matchCat = currentCategory === 'all' || p.category === currentCategory;
        const q = searchQuery;
        const matchSearch = !q || 
          fuzzyMatch(p.name.zh, q) ||
          fuzzyMatch(p.name.en, q) ||
          fuzzyMatch(p.model, q) ||
          fuzzyMatch(p.specs.zh, q) ||
          fuzzyMatch(p.specs.en, q) ||
          fuzzyMatch(p.categoryName.zh, q) ||
          fuzzyMatch(p.categoryName.en, q);
        return matchCat && matchSearch;
      });

      const grid = document.getElementById('productsGrid');
      const noResults = document.getElementById('noResults');
      
      document.getElementById('resultsCount').textContent = 
        currentLang === 'zh' ? `共 ${filtered.length} 个产品` : `${filtered.length} products`;
      
      if (filtered.length === 0) {
        grid.style.display = 'none';
        noResults.style.display = 'block';
        return;
      }
      
      grid.style.display = 'grid';
      noResults.style.display = 'none';
      
      grid.innerHTML = filtered.map(p => {
        const name = p.name[currentLang];
        const specs = p.specs[currentLang];
        const features = p.features[currentLang];
        const catName = p.categoryName[currentLang];
        const docLabel = currentLang === 'zh' ? 'Word文档' : 'Word Doc';
        const pdfLabel = currentLang === 'zh' ? 'PDF文件' : 'PDF';
        const specLabel = currentLang === 'zh' ? '规格参数' : 'Specs';
        const featLabel = currentLang === 'zh' ? '产品特点' : 'Features';
        const downloadLabel = currentLang === 'zh' ? '下载' : 'Download';
        const noDocLabel = currentLang === 'zh' ? '暂无文档' : 'No doc';
        const currentDoc = p.docFiles ? p.docFiles[currentLang] || p.docFiles['en'] : null;
        const currentPdf = p.pdfFiles ? p.pdfFiles[currentLang] || p.pdfFiles['en'] : null;
        
        return `
        <a href="product.html?model=${encodeURIComponent(p.model)}&lang=${currentLang}" class="product-card-link">
        <div class="product-card">
          <div class="product-header">
            <div class="product-icon">📊</div>
            <div class="product-title">
              <div class="product-model">${p.model}</div>
              <div class="product-name">${name}</div>
              <div class="product-name-en">${p.name.en}</div>
            </div>
            <div class="product-category-badge">${catName}</div>
          </div>
          <div class="product-body">
            <div class="product-specs">
              <div class="product-specs-label">${specLabel}</div>
              ${specs}
            </div>
            <div class="product-features">
              <div class="product-features-label">${featLabel}</div>
              ${features.slice(0, 3).map(f => `
                <div class="feature-item">
                  <span class="feature-dot">•</span>
                  <span>${f}</span>
                </div>
              `).join('')}
            </div>
          </div>
          <div class="product-footer" onclick="event.stopPropagation(); event.preventDefault();">
            ${currentDoc ? `<a href="products/${currentDoc}" class="download-btn doc" download onclick="event.stopPropagation()">📥 ${downloadLabel} ${docLabel}</a>` : `<span class="download-btn disabled">${noDocLabel}</span>`}
            ${currentPdf ? `<a href="products/${currentPdf}" class="download-btn pdf" download onclick="event.stopPropagation()">📥 ${downloadLabel} ${pdfLabel}</a>` : ''}
          </div>
        </div>
        </a>
        `;
      }).join('');
    }

      searchQuery = document.getElementById('searchInput').value;
      renderProducts();
    }
