    let currentLang = 'zh';
    let currentCategory = 'all';
    let searchQuery = '';

    function handleSearch(query) {
      searchQuery = query.trim();
      renderProducts();
    }

    function handleCategoryChange(cat) {
      currentCategory = cat;
      renderProducts();
    }

    function switchProductsLang(lang) {
      currentLang = lang;
      renderProducts();
    }

    function fuzzyMatch(text, query) {
      if (!text || !query) return false;
      text = text.toLowerCase();
      query = query.toLowerCase();
      return text.includes(query);
    }

    function renderProducts() {
      const filtered = products.filter(p => {
        const matchCat = currentCategory === 'all' || p.category === currentCategory;
        const q = searchQuery;
        const matchSearch = !q || 
          fuzzyMatch(p.name.zh, q) || 
          fuzzyMatch(p.name.en, q) || 
          fuzzyMatch(p.model, q) || 
          fuzzyMatch(p.specs.zh, q) || 
          fuzzyMatch(p.categoryName.zh, q);
        return matchCat && matchSearch;
      });

      const grid = document.getElementById('productsGrid');
      const noResults = document.getElementById('noResults');
      document.getElementById('resultsCount').textContent = currentLang === 'zh' 
        ? `共 ${filtered.length} 个产品` 
        : `${filtered.length} products`;

      if (filtered.length === 0) {
        grid.style.display = 'none';
        noResults.style.display = 'block';
        return;
      }

      grid.style.display = 'grid';
      noResults.style.display = 'none';

      grid.innerHTML = filtered.map(p => {
        const name = p.name[currentLang] || p.name.zh;
        const catName = p.categoryName[currentLang] || p.categoryName.zh;
        const docLabel = currentLang === 'zh' ? 'Word文档' : 'Word';
        const docFile = p.docFiles ? (p.docFiles[currentLang] || p.docFiles.en) : null;
        const imgSrc = p.image || 'products/placeholder.png';
        const detailUrl = `product.html?model=${encodeURIComponent(p.model)}&lang=${currentLang}`;

        return `<div class="product-card" onclick="window.location='${detailUrl}'">
          <div class="product-image">${p.image ? `<img src="${imgSrc}" alt="${name}" loading="lazy">` : '<div class="no-image">📷</div>'}</div>
          <div class="product-info">
            <div class="product-model">${p.model}</div>
            <div class="product-name">${name}</div>
            <div class="product-category">${catName}</div>
            ${docFile ? `<div class="product-doc">📄 ${docLabel}</div>` : ''}
          </div>
        </div>`;
      }).join('');
    }

    // Init
    document.addEventListener('DOMContentLoaded', renderProducts);
  </script>
</body>
</html>
